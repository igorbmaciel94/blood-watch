name: trivy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  filesystem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository dependencies
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            aquasec/trivy:0.68.2 \
            fs /workspace \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workspace/trivy-fs.sarif \
            --ignore-unfixed \
            --quiet \
            --exit-code 1

      - name: Upload filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan IaC and container configuration
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            aquasec/trivy:0.68.2 \
            config /workspace \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workspace/trivy-config.sarif \
            --quiet \
            --exit-code 1

      - name: Upload configuration SARIF
        if: always() && hashFiles('trivy-config.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
